<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FIRE SHOT - Season 1</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Montserrat:wght@800;900&display=swap');

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            user-select: none; -webkit-touch-callout: none; -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100vw; height: 100dvh; background: #111; overflow: hidden;
            font-family: 'Montserrat', sans-serif; color: white;
            touch-action: none; overscroll-behavior: none;
        }

        /* --- MENUS E LOBBY --- */
        .fullscreen-menu {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh;
            background: rgba(0,0,0,0.95); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .fullscreen-menu h1 { font-family: 'Luckiest Guy'; color: #ffea00; font-size: 3rem; margin-bottom: 20px; text-shadow: 3px 3px 0 #ff3e3e; }
        
        .lobby-box { background: #222; border: 4px solid #555; padding: 30px; border-radius: 15px; text-align: center; display: flex; flex-direction: column; gap: 15px; width: 90%; max-width: 400px;}
        .lobby-box input { padding: 15px; font-size: 1.2rem; font-family: 'Luckiest Guy'; text-align: center; border-radius: 8px; border: 2px solid #fff; background: #333; color: #ffea00; outline: none; }
        .lobby-box button { padding: 15px; font-size: 1.5rem; font-family: 'Luckiest Guy'; border-radius: 8px; border: none; cursor: pointer; transition: 0.1s; }
        .btn-create { background: #1e90ff; color: white; border-bottom: 4px solid #0b5fb4; }
        .btn-join { background: #ffea00; color: #111; border-bottom: 4px solid #b8a900; }
        .lobby-box button:active { transform: translateY(4px); border-bottom: 0px; }
        
        #room-display { font-family: 'Luckiest Guy'; font-size: 1.5rem; color: #1e90ff; margin-bottom: 10px; display: none; }

        /* --- ARMAS --- */
        #weapon-screen { display: none; }
        .weapon-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; max-width: 95%; max-height: 70vh; padding: 10px; }
        .weapon-card { background: #222; border: 3px solid #555; border-radius: 10px; padding: 10px; text-align: center; cursor: pointer; pointer-events: auto; }
        .weapon-card:active { transform: scale(0.95); }
        .weapon-card h3 { font-size: 0.9rem; margin-bottom: 5px; }
        .weapon-card p { font-size: 0.65rem; color: #aaa; }

        /* --- HUD --- */
        #hud-layer {
            position: absolute; top: 0; left: 0; width: 100%; padding: 15px 20px;
            display: none; justify-content: space-between; align-items: flex-start;
            z-index: 20; pointer-events: none;
        }
        .player-info { display: flex; flex-direction: column; gap: 5px; }
        .player-name { font-family: 'Luckiest Guy'; font-size: 1.2rem; text-shadow: 2px 2px 0 #000; }
        
        .hp-bar-bg { width: 150px; height: 20px; background: rgba(0,0,0,0.8); border: 2px solid white; border-radius: 10px; overflow: hidden; position: relative; }
        .hp-bar-fill { height: 100%; transition: width 0.1s linear; }
        .hp-text { position: absolute; width: 100%; text-align: center; top: 1px; font-size: 0.8rem; font-weight: 900; text-shadow: 1px 1px 0 #000; }

        .score-board { background: rgba(0,0,0,0.8); border: 2px solid #ffea00; padding: 5px 20px; border-radius: 8px; text-align: center; font-family: 'Luckiest Guy'; font-size: 1.8rem; text-shadow: 2px 2px 0 #000; }

        #announcer { position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); font-family: 'Luckiest Guy'; font-size: 3rem; color: #ffea00; text-shadow: 4px 4px 0 #000; z-index: 50; display: none; text-align: center; pointer-events: none; }

        /* --- CONTROLES --- */
        .joystick-zone { position: absolute; bottom: 30px; width: 140px; height: 140px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2); border-radius: 50%; pointer-events: auto; z-index: 15; touch-action: none; display: none; }
        #joy-move { left: 30px; }
        #joy-aim { right: 30px; }
        .knob { width: 50px; height: 50px; background: rgba(255,255,255,0.7); border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; will-change: transform; }
        #btn-shoot { position: absolute; bottom: 190px; right: 40px; width: 80px; height: 80px; background: rgba(255, 62, 62, 0.4); border: 3px solid rgba(255, 255, 255, 0.5); border-radius: 50%; display: none; justify-content: center; align-items: center; font-family: 'Luckiest Guy', sans-serif; font-size: 1.2rem; color: white; z-index: 15; pointer-events: auto; touch-action: none; transition: 0.1s; }

        /* --- CANVAS --- */
        #game-container { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        canvas { background: #3b3b3b; background-image: linear-gradient(rgba(0,0,0,0.3) 2px, transparent 2px), linear-gradient(90deg, rgba(0,0,0,0.3) 2px, transparent 2px); background-size: 50px 50px; box-shadow: 0 0 0 8px #111; display: none; }
    </style>
</head>
<body>

    <div id="lobby-screen" class="fullscreen-menu">
        <h1>FIRE SHOT</h1>
        <div class="lobby-box">
            <button class="btn-create" id="btn-create-room">CRIAR SALA</button>
            <h2 style="color:#777">OU</h2>
            <input type="text" id="input-room-id" placeholder="CÓDIGO DA SALA" autocomplete="off" maxlength="6">
            <button class="btn-join" id="btn-join-room">ENTRAR</button>
        </div>
        <p id="lobby-status" style="margin-top: 15px; color: #ffea00; font-weight: bold;"></p>
    </div>

    <div id="weapon-screen" class="fullscreen-menu">
        <div id="room-display">SALA: <span id="display-id" style="color:white;"></span></div>
        <h1 style="font-size: 2rem;">ESCOLHA SUA ARMA</h1>
        <div class="weapon-grid" id="weapon-list"></div>
        <p id="wait-status" style="margin-top: 20px; color: #1e90ff; font-weight: bold; display: none;">AGUARDANDO OPONENTE...</p>
    </div>

    <div id="announcer">PREPARAR!</div>

    <div id="hud-layer">
        <div class="player-info" style="align-items: flex-start;">
            <div class="player-name" style="color: #1e90ff;">VOCÊ</div>
            <div class="hp-bar-bg"><div class="hp-bar-fill" id="my-hp-bar" style="background: #1e90ff; width: 100%;"></div><div class="hp-text" id="my-hp-text">100</div></div>
        </div>
        <div class="score-board"><span style="color: #1e90ff;" id="score-p1">0</span> <span style="color: white;">-</span> <span style="color: #ff3e3e;" id="score-p2">0</span></div>
        <div class="player-info" style="align-items: flex-end;">
            <div class="player-name" style="color: #ff3e3e;">INIMIGO</div>
            <div class="hp-bar-bg"><div class="hp-bar-fill" id="enemy-hp-bar" style="background: #ff3e3e; width: 100%;"></div><div class="hp-text" id="enemy-hp-text">100</div></div>
        </div>
    </div>

    <div class="joystick-zone" id="joy-move"><div class="knob" id="knob-move"></div></div>
    <div class="joystick-zone" id="joy-aim"><div class="knob" id="knob-aim"></div></div>
    <div id="btn-shoot">ATIRAR</div>

    <div id="game-container"><canvas id="gameCanvas" width="600" height="600"></canvas></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        // --- CONFIGURAÇÃO FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyCevJAebGzPrKOadYHfh5JDcYGQmlKyRd8",
            authDomain: "joy-core.firebaseapp.com",
            projectId: "joy-core",
            storageBucket: "joy-core.firebasestorage.app",
            messagingSenderId: "418254350950",
            appId: "1:418254350950:web:d390ef983c37e8730e9ba7",
            measurementId: "G-D5GC14MJKH"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- VARIÁVEIS MULTIPLAYER ---
        let currentRoomId = null;
        let myPlayerId = null; // 'p1' (host) ou 'p2' (visitante)
        let enemyPlayerId = null;
        let roomDocRef = null;
        let lastSyncTime = 0;

        // --- CONFIGURAÇÕES DO JOGO ---
        const WEAPONS = {
            "Pistola": { type: 'pistol', dmg: 20, speed: 12, fireRate: 350, color: '#fff' },
            "SMG": { type: 'smg', dmg: 10, speed: 14, fireRate: 110, color: '#ffea00' },
            "Shotgun": { type: 'shotgun', dmg: 15, speed: 10, fireRate: 800, count: 4, spread: 0.35, color: '#ff3e3e' },
            "Sniper": { type: 'sniper', dmg: 75, speed: 25, fireRate: 1200, color: '#8a2be2' }
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const MAP_SIZE = 600;
        const PLAYER_RADIUS = 20;

        function resizeCanvas() {
            const scale = Math.min(window.innerWidth / 620, window.innerHeight / 620);
            canvas.style.transform = `scale(${scale})`;
        }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        let currentWeapon = null;
        let bullets = [];
        let score = { me: 0, enemy: 0 };
        let isRoundActive = false;
        let lastShotTime = 0;

        let me = { x: 100, y: 100, hp: 100, angle: 0, color: '#1e90ff' };
        let enemy = { x: 500, y: 500, hp: 100, angle: Math.PI, color: '#ff3e3e' };
        let input = { moveX: 0, moveY: 0, aimX: 0, aimY: 0 };
        let isShooting = false;

        // --- UI E MENUS ---
        function setStatus(text) { document.getElementById('lobby-status').innerText = text; }
        
        function generateRoomId() {
            return Math.random().toString(36).substring(2, 8).toUpperCase();
        }

        function showUI(elements) {
            elements.forEach(id => document.getElementById(id).style.display = 'flex');
        }
        function hideUI(elements) {
            elements.forEach(id => document.getElementById(id).style.display = 'none');
        }

        // --- SISTEMA DE LOBBY (FIRESTORE) ---
        document.getElementById('btn-create-room').addEventListener('click', async () => {
            try {
                setStatus("CRIANDO SALA...");
                currentRoomId = generateRoomId();
                myPlayerId = 'p1'; enemyPlayerId = 'p2';
                roomDocRef = doc(db, "salas", currentRoomId);
                
                await setDoc(roomDocRef, {
                    p1: { x: 100, y: 100, hp: 100, angle: 0, score: 0, ready: false },
                    p2: { x: 500, y: 500, hp: 100, angle: Math.PI, score: 0, ready: false },
                    status: "waiting"
                });

                me.x = 100; me.y = 100; enemy.x = 500; enemy.y = 500;
                goToWeaponScreen();
            } catch (e) {
                setStatus("ERRO AO CRIAR SALA: " + e.message);
            }
        });

        document.getElementById('btn-join-room').addEventListener('click', async () => {
            const id = document.getElementById('input-room-id').value.toUpperCase();
            if(!id) return setStatus("DIGITE O CÓDIGO!");
            
            setStatus("BUSCANDO SALA...");
            roomDocRef = doc(db, "salas", id);
            const docSnap = await getDoc(roomDocRef);

            if (docSnap.exists()) {
                currentRoomId = id;
                myPlayerId = 'p2'; enemyPlayerId = 'p1';
                me.x = 500; me.y = 500; enemy.x = 100; enemy.y = 100;
                me.color = '#ff3e3e'; enemy.color = '#1e90ff'; // Visitante é vermelho localmente
                goToWeaponScreen();
            } else {
                setStatus("SALA NÃO ENCONTRADA!");
            }
        });

        function goToWeaponScreen() {
            hideUI(['lobby-screen']);
            showUI(['weapon-screen', 'room-display']);
            document.getElementById('display-id').innerText = currentRoomId;
            
            const weaponList = document.getElementById('weapon-list');
            weaponList.innerHTML = '';
            for (let [name, stats] of Object.entries(WEAPONS)) {
                let btn = document.createElement('div');
                btn.className = `weapon-card`; btn.style.borderColor = stats.color;
                btn.innerHTML = `<h3 style="color:${stats.color}">${name}</h3><p>Dano: ${stats.dmg}</p>`;
                btn.onclick = async () => {
                    currentWeapon = stats;
                    document.getElementById('weapon-list').style.display = 'none';
                    document.getElementById('wait-status').style.display = 'block';
                    
                    // Informa ao banco que estou pronto
                    await updateDoc(roomDocRef, {
                        [`${myPlayerId}.ready`]: true
                    });
                    
                    listenToRoom(); // Começa a ouvir o outro jogador
                };
                weaponList.appendChild(btn);
            }
        }

        // --- SINCRONIZAÇÃO EM TEMPO REAL ---
        function listenToRoom() {
            onSnapshot(roomDocRef, (docSnap) => {
                const data = docSnap.data();
                if(!data) return;

                // Inicia o jogo se ambos estiverem prontos e o jogo ainda não tiver começado
                if (data.p1.ready && data.p2.ready && !isRoundActive && document.getElementById('weapon-screen').style.display !== 'none') {
                    hideUI(['weapon-screen']);
                    showUI(['hud-layer', 'joy-move', 'joy-aim', 'btn-shoot']);
                    document.querySelector('canvas').style.display = 'block';
                    startGame();
                }

                // Atualiza a posição do inimigo se o jogo estiver rodando
                if (isRoundActive) {
                    enemy.x = data[enemyPlayerId].x;
                    enemy.y = data[enemyPlayerId].y;
                    enemy.angle = data[enemyPlayerId].angle;
                    
                    // Se o inimigo me deu dano (Meu HP no banco é menor que o local)
                    if (data[myPlayerId].hp < me.hp) {
                        me.hp = data[myPlayerId].hp;
                        updateHUD();
                        if (me.hp <= 0) endRound('enemy');
                    }
                }
            });
        }

        async function syncMyPosition() {
            const now = Date.now();
            // Throttle: Envia posição a cada 100ms para poupar cota do Firestore
            if (now - lastSyncTime > 100) {
                lastSyncTime = now;
                await updateDoc(roomDocRef, {
                    [`${myPlayerId}.x`]: Math.round(me.x),
                    [`${myPlayerId}.y`]: Math.round(me.y),
                    [`${myPlayerId}.angle`]: parseFloat(me.angle.toFixed(2))
                });
            }
        }

        // Aplica dano no inimigo direto no banco de dados
        async function damageEnemy(dmg) {
            enemy.hp -= dmg;
            updateHUD();
            await updateDoc(roomDocRef, {
                [`${enemyPlayerId}.hp`]: enemy.hp
            });
            if (enemy.hp <= 0) {
                endRound('me');
            }
        }

        // --- SISTEMA DE JOYSTICK (POINTER EVENTS) ---
        function createJoystick(zoneId, knobId, isAim) {
            const zone = document.getElementById(zoneId);
            const knob = document.getElementById(knobId);
            const maxDist = 45;
            let activeId = null;
            let center = { x: 0, y: 0 };

            function updateKnob(clientX, clientY) {
                let dx = clientX - center.x; let dy = clientY - center.y;
                let dist = Math.hypot(dx, dy);
                if (dist > maxDist) { dx = (dx / dist) * maxDist; dy = (dy / dist) * maxDist; }
                knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                let normX = dist === 0 ? 0 : dx / maxDist; let normY = dist === 0 ? 0 : dy / maxDist;
                if (isAim) { input.aimX = normX; input.aimY = normY; } else { input.moveX = normX; input.moveY = normY; }
            }

            zone.addEventListener('pointerdown', e => {
                if (activeId !== null) return;
                activeId = e.pointerId; zone.setPointerCapture(e.pointerId);
                const rect = zone.getBoundingClientRect();
                center = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
                updateKnob(e.clientX, e.clientY);
            });
            zone.addEventListener('pointermove', e => { if (activeId === e.pointerId) updateKnob(e.clientX, e.clientY); });
            function handleEnd(e) {
                if (activeId === e.pointerId) {
                    activeId = null; zone.releasePointerCapture(e.pointerId);
                    knob.style.transform = `translate(-50%, -50%)`;
                    if(isAim) { input.aimX = 0; input.aimY = 0; } else { input.moveX = 0; input.moveY = 0; }
                }
            }
            zone.addEventListener('pointerup', handleEnd); zone.addEventListener('pointercancel', handleEnd);
        }

        const btnShoot = document.getElementById('btn-shoot');
        btnShoot.addEventListener('pointerdown', e => { isShooting = true; btnShoot.setPointerCapture(e.pointerId); btnShoot.style.background = 'rgba(255, 62, 62, 0.8)'; btnShoot.style.transform = 'scale(0.9)'; });
        function stopShooting(e) { isShooting = false; btnShoot.releasePointerCapture(e.pointerId); btnShoot.style.background = 'rgba(255, 62, 62, 0.4)'; btnShoot.style.transform = 'scale(1)'; }
        btnShoot.addEventListener('pointerup', stopShooting); btnShoot.addEventListener('pointercancel', stopShooting);

        // --- LÓGICA DO JOGO ---
        function announce(text, time) {
            const el = document.getElementById('announcer');
            el.innerText = text; el.style.display = 'block';
            if(time) setTimeout(() => el.style.display = 'none', time);
        }

        function updateHUD() {
            document.getElementById('my-hp-bar').style.width = Math.max(0, me.hp) + '%';
            document.getElementById('my-hp-text').innerText = Math.max(0, Math.floor(me.hp));
            document.getElementById('enemy-hp-bar').style.width = Math.max(0, enemy.hp) + '%';
            document.getElementById('enemy-hp-text').innerText = Math.max(0, Math.floor(enemy.hp));
            document.getElementById('score-p1').innerText = score.me;
            document.getElementById('score-p2').innerText = score.enemy;
        }

        function startGame() {
            announce("FIGHT!", 1500);
            isRoundActive = true;
            updateHUD();
            gameLoop();
        }

        function fireBullet(x, y, angle, weapon) {
            bullets.push({
                x: x + Math.cos(angle) * (PLAYER_RADIUS + 15),
                y: y + Math.sin(angle) * (PLAYER_RADIUS + 15),
                vx: Math.cos(angle) * weapon.speed,
                vy: Math.sin(angle) * weapon.speed,
                dmg: weapon.dmg, color: weapon.color, life: 100
            });
        }

        function handlePlayerShooting() {
            if (!isShooting || !currentWeapon) return;
            const now = Date.now();
            if (now - lastShotTime < currentWeapon.fireRate) return;
            lastShotTime = now;

            if (currentWeapon.type === 'shotgun') {
                for(let i=0; i<currentWeapon.count; i++) {
                    let spread = me.angle - currentWeapon.spread + (Math.random() * currentWeapon.spread * 2);
                    fireBullet(me.x, me.y, spread, currentWeapon);
                }
            } else {
                fireBullet(me.x, me.y, me.angle, currentWeapon);
            }
        }

        function updateGame() {
            if (!isRoundActive) return;

            let moved = false;
            if (!isNaN(input.moveX) && input.moveX !== 0) { me.x += input.moveX * 5; moved = true; }
            if (!isNaN(input.moveY) && input.moveY !== 0) { me.y += input.moveY * 5; moved = true; }
            
            me.x = Math.max(PLAYER_RADIUS, Math.min(MAP_SIZE - PLAYER_RADIUS, me.x));
            me.y = Math.max(PLAYER_RADIUS, Math.min(MAP_SIZE - PLAYER_RADIUS, me.y));

            if (input.aimX !== 0 || input.aimY !== 0) {
                me.angle = Math.atan2(input.aimY, input.aimX); moved = true;
            } else if (input.moveX !== 0 || input.moveY !== 0) {
                me.angle = Math.atan2(input.moveY, input.moveX);
            }

            if (moved) syncMyPosition();

            handlePlayerShooting();

            // Atualiza Balas Locais (Só calculo se a MINHA bala acertou ELE)
            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                b.x += b.vx; b.y += b.vy; b.life--;

                let dist = Math.hypot(b.x - enemy.x, b.y - enemy.y);

                if (dist < PLAYER_RADIUS && enemy.hp > 0) {
                    damageEnemy(b.dmg); // Envia dano pro servidor
                    bullets.splice(i, 1);
                    continue;
                }

                if (b.life <= 0 || b.x < 0 || b.x > MAP_SIZE || b.y < 0 || b.y > MAP_SIZE) {
                    bullets.splice(i, 1);
                }
            }
        }

        async function endRound(winner) {
            if(!isRoundActive) return;
            isRoundActive = false;
            
            if(winner === 'me') score.me++;
            else score.enemy++;
            
            updateHUD();

            if (score.me >= 7) { announce("VITÓRIA!", 0); setTimeout(() => window.location.reload(), 4000); return; } 
            else if (score.enemy >= 7) { announce("DERROTA!", 0); setTimeout(() => window.location.reload(), 4000); return; }

            announce(winner === 'me' ? "ROUND GANHO!" : "ROUND PERDIDO!", 2000);
            
            setTimeout(async () => {
                me.hp = 100; enemy.hp = 100;
                me.x = myPlayerId === 'p1' ? 100 : 500; 
                me.y = myPlayerId === 'p1' ? 100 : 500;
                bullets = []; updateHUD();
                
                // Reseta no banco
                await updateDoc(roomDocRef, {
                    [`${myPlayerId}.hp`]: 100,
                    [`${myPlayerId}.x`]: me.x,
                    [`${myPlayerId}.y`]: me.y
                });

                announce(`ROUND ${score.me + score.enemy + 1}`, 2000);
                isRoundActive = true;
            }, 3000);
        }

        // --- RENDERIZAÇÃO ---
        function drawPlayer(p) {
            ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.angle);
            ctx.fillStyle = '#666'; ctx.fillRect(0, -5, PLAYER_RADIUS + 15, 10);
            ctx.strokeRect(0, -5, PLAYER_RADIUS + 15, 10);
            ctx.beginPath(); ctx.arc(0, 0, PLAYER_RADIUS, 0, Math.PI * 2);
            ctx.fillStyle = p.color; ctx.fill(); ctx.lineWidth = 3; ctx.strokeStyle = '#fff'; ctx.stroke();
            ctx.beginPath(); ctx.arc(PLAYER_RADIUS, -12, 6, 0, Math.PI*2); ctx.arc(PLAYER_RADIUS, 12, 6, 0, Math.PI*2);
            ctx.fillStyle = '#ffdbac'; ctx.fill(); ctx.stroke();
            ctx.restore();
        }

        function draw() {
            ctx.clearRect(0, 0, MAP_SIZE, MAP_SIZE);
            bullets.forEach(b => { ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI * 2); ctx.fillStyle = b.color; ctx.fill(); });
            if (me.hp > 0) drawPlayer(me);
            if (enemy.hp > 0) drawPlayer(enemy);
        }

        function gameLoop() {
            updateGame(); draw();
            requestAnimationFrame(gameLoop);
        }

        // INICIA JOYSTICKS
        createJoystick('joy-move', 'knob-move', false);
        createJoystick('joy-aim', 'knob-aim', true);
    </script>
</body>
</html>
