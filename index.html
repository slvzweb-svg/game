<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BLACK CONTRACT - Entrada</title>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        // import { getFirestore } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "SUA_API_KEY",
            authDomain: "SEU_DOMINIO",
            projectId: "SEU_PROJECT_ID",
            storageBucket: "SEU_BUCKET",
            messagingSenderId: "SEU_SENDER",
            appId: "SEU_APP_ID"
        };
        const app = initializeApp(firebaseConfig);
        console.log("🔥 Firebase ON");
    </script>

    <style>
        /* ========================================================
           FONTES E BASE (ESTILO FORTNITE / BATTLE ROYALE)
           A fonte Montserrat Black Italic imita bem a 'Burbank'
        ======================================================== */
        @import url('https://thoughtless-azure-7bz1xfamkt.edgeone.app/file_00000000d184720e83d956c193466b28.png');

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100vw; height: 100dvh;
            background-color: #000;
            font-family: 'Montserrat', sans-serif; /* Fonte base inclinada e grossa */
            overflow: hidden;
            color: white;
        }

        /* Tipografia Padrão BR */
        .br-text {
            text-transform: uppercase;
            font-style: italic;
            font-weight: 900;
            text-shadow: 2px 2px 0px #000, 4px 4px 0px rgba(0,0,0,0.5); /* Sombra dura estilo HQ/Fortnite */
        }

        /* ========================================================
           BOTÃO FULLSCREEN (FLUTUANTE DIREITA)
        ======================================================== */
        #btn-fullscreen {
            position: fixed; top: 15px; right: 15px; z-index: 10000;
            width: 50px; height: 50px;
            background: rgba(20, 20, 20, 0.85);
            border: 3px solid #ffea00;
            border-radius: 8px;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
            transform: skewX(-10deg); /* Inclinação Fortnite */
            box-shadow: 0 4px 0 #b3a400, 0 0 15px rgba(255, 234, 0, 0.3);
            transition: all 0.1s;
        }
        #btn-fullscreen:active {
            transform: skewX(-10deg) translateY(4px);
            box-shadow: 0 0 0 #b3a400, 0 0 5px rgba(255, 234, 0, 0.5);
        }
        #btn-fullscreen svg { width: 26px; height: 26px; fill: #fff; transform: skewX(10deg); /* Desfaz inclinação no ícone */ }

        /* ========================================================
           SISTEMA DE ORIENTAÇÃO (TRAVA O JOGO EM PÉ)
        ======================================================== */
        #orientation-lock {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh;
            background: radial-gradient(circle, #1a0000 0%, #000000 100%);
            z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }

        @media screen and (orientation: portrait) {
            #orientation-lock { opacity: 1; pointer-events: all; }
            #game-layer { filter: blur(20px) grayscale(50%); pointer-events: none; }
        }

        .phone-spinner {
            width: 70px; height: 110px;
            border: 5px solid #fff; border-radius: 10px;
            position: relative;
            animation: spinPhone 2s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
            box-shadow: 0 0 20px #ff3e3e;
        }
        .phone-spinner::after {
            content: ''; position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%);
            width: 20px; height: 5px; background: #fff; border-radius: 3px;
        }
        @keyframes spinPhone {
            0% { transform: rotate(0deg); border-color: #fff; }
            50% { transform: rotate(-90deg); border-color: #ff3e3e; }
            100% { transform: rotate(-90deg); border-color: #fff; }
        }

        #orientation-lock h1 {
            margin-top: 40px; font-size: 2.5rem; color: #ff3e3e; letter-spacing: 2px;
        }
        #orientation-lock p {
            margin-top: 10px; font-size: 1.2rem; color: #aaa; text-transform: uppercase; font-weight: 900;
        }

        /* ========================================================
           1. SPLASH SCREEN (LOGO + GLITCH ADAPTADO PARA IMAGEM)
        ======================================================== */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh;
            background: #000; z-index: 5000;
            display: flex; justify-content: center; align-items: center;
            transition: opacity 0.5s ease;
        }

        .logo-box {
            position: relative;
            opacity: 0;
            width: 280px; /* Tamanho da sua logo - ajuste conforme precisar */
            height: auto;
            animation: splashEntrance 2.5s forwards;
        }

        .logo-box img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Animação Splahs + Glitch Intenso para Imagens */
        @keyframes splashEntrance {
            0% { opacity: 0; transform: scale(0.8) translateY(20px); filter: brightness(2); }
            15% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0) brightness(1); }
            
            /* Início do Glitch (Cortes e Desvios de Cor via Drop-Shadow) */
            20% { 
                transform: translate(8px, -4px) skewX(-15deg); 
                filter: drop-shadow(-5px 0 #ffea00) drop-shadow(5px 0 #00f0ff);
                clip-path: inset(30% 0 40% 0); 
            }
            22% { 
                transform: translate(-8px, 4px) skewX(15deg); 
                filter: drop-shadow(-5px 0 #ff3e3e) drop-shadow(5px 0 #00f0ff);
                clip-path: inset(10% 0 70% 0); 
            }
            24% { 
                transform: translate(0, 0) skewX(0deg); 
                filter: drop-shadow(0 0 10px rgba(255,62,62,0.5));
                clip-path: inset(0 0 0 0); 
            }
            
            /* Estabiliza e sai com Fade */
            85% { opacity: 1; transform: scale(1); filter: blur(0); }
            100% { opacity: 0; transform: scale(1.1); filter: blur(15px); }
        }

        /* ========================================================
           2. LOADING SCREEN (DISTRITO ZERO)
        ======================================================== */
        #loading-screen {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100dvh;
            /* SEU FUNDO MANTIDO AQUI */
            background: url('https://rude-chocolate-neifebk6vy.edgeone.app/file_00000000f00c71f5b731cc89bddd0de7.png') center/cover no-repeat;
            z-index: 4000;
            opacity: 0; filter: blur(20px);
            transition: opacity 0.8s ease, filter 1.5s ease-out;
        }

        .dark-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(0deg, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.4) 40%, rgba(0,0,0,0.1) 100%);
        }

        .ui-container {
            position: absolute; bottom: 50px; left: 5%; width: 90%;
            display: flex; flex-direction: column; gap: 20px;
        }

        /* --- TOASTS (DICAS) ESTILO BATTLE ROYALE --- */
        #toast-box {
            display: flex; align-items: center; gap: 15px;
            background: rgba(10, 10, 10, 0.85);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-left: 6px solid #ffea00;
            padding: 12px 25px;
            width: fit-content;
            transform: skewX(-10deg);
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
            opacity: 0; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #toast-box.show { opacity: 1; transform: skewX(-10deg) translateX(0); }
        #toast-box.hide { opacity: 0; transform: skewX(-10deg) translateX(-30px); }

        .toast-icon { transform: skewX(10deg); display: flex; align-items: center; }
        .toast-icon svg { width: 30px; height: 30px; fill: #ffea00; filter: drop-shadow(0 0 5px rgba(255,234,0,0.5)); }
        
        .toast-text {
            font-size: 1.1rem; letter-spacing: 1px; color: #fff;
            text-transform: uppercase; font-style: italic; font-weight: 900;
        }

        /* --- BARRA DE BALA (ASSINATURA) --- */
        .loading-status-text {
            font-size: 1.3rem; color: #fff; letter-spacing: 2px;
            text-transform: uppercase; margin-bottom: -10px; margin-left: 10px;
            text-shadow: 2px 2px 0 #000;
        }
        .loading-status-text span { color: #ff3e3e; }

        .bullet-bar-bg {
            width: 100%; height: 14px;
            background: rgba(0,0,0,0.6);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            position: relative;
            box-shadow: inset 0 3px 5px rgba(0,0,0,0.8);
        }

        .bullet-progress {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, transparent, #ff9d00, #ffea00);
            border-radius: 20px;
            position: relative;
            transition: width 0.1s linear;
        }

        /* SVG da Bala via código para ser super leve */
        .bullet-projectile {
            position: absolute; right: -20px; top: -14px;
            width: 45px; height: 40px;
            filter: drop-shadow(4px 0px 8px #ffea00);
        }

        /* Efeito de Explosão no 100% */
        .impact-boom {
            position: absolute; right: -50px; top: -45px;
            width: 100px; height: 100px;
            background: radial-gradient(circle, #fff 0%, #ffea00 20%, #ff3e3e 50%, transparent 80%);
            border-radius: 50%; opacity: 0; transform: scale(0);
            mix-blend-mode: screen; pointer-events: none;
        }
        .impact-boom.active { animation: boomAnim 0.6s ease-out forwards; }

        @keyframes boomAnim {
            0% { opacity: 1; transform: scale(0.2); }
            40% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0; transform: scale(2.5); }
        }

    </style>
</head>
<body>

    <div id="orientation-lock">
        <div class="phone-spinner"></div>
        <h1 class="br-text">ALERTA</h1>
        <p>Gire o dispositivo para jogar</p>
    </div>

    <div id="btn-fullscreen" onclick="toggleFS()">
        <svg viewBox="0 0 24 24"><path d="M5 5h5v2H7v3H5V5zm4 14H5v-5h2v3h2v2zm10-5h-2v3h-3v2h5v-5zm-5-9h3v3h2V5h-5v2z"/></svg>
    </div>

    <div id="game-layer">
        
        <div id="splash-screen">
            <div class="logo-box">
                <img src="https://panicky-amber-osjhtvmohp.edgeone.app/BackgroundEraser_20260424_211808040.png" alt="Black Contract Logo" id="logo-image">
            </div>
        </div>

        <div id="loading-screen">
            <div class="dark-overlay"></div>
            
            <div class="ui-container">
                
                <div id="toast-box" class="hide">
                    <div class="toast-icon" id="toast-icon-render"></div>
                    <div class="toast-text" id="toast-text-render">CARREGANDO...</div>
                </div>

                <div class="loading-status-text br-text" id="loading-status">CONECTANDO<span>...</span></div>
                
                <div class="bullet-bar-bg">
                    <div class="bullet-progress" id="loading-bar">
                        <svg class="bullet-projectile" viewBox="0 0 45 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M5 16H25C32 16 38 20 38 20C38 20 32 24 25 24H5L10 20L5 16Z" fill="#dddddd"/>
                            <path d="M25 16.5C29 16.5 35 20 35 20C35 20 29 23.5 25 23.5H11L15 20L11 16.5H25Z" fill="#ffea00"/>
                            <rect x="0" y="18" width="8" height="1.5" fill="white" opacity="0.8"/>
                            <rect x="-5" y="21" width="12" height="1.5" fill="white" opacity="0.6"/>
                        </svg>
                        <div class="impact-boom" id="impact-fx"></div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        /* ========================================================
           SISTEMA DE DICAS (SVGs Premium sem emojis)
        ======================================================== */
        const tips = [
            {
                text: "ELIMINE SEU ALVO PARA GANHAR MAIS DINHEIRO",
                // SVG Alvo Sniper
                svg: `<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm4-8c0 2.21-1.79 4-4 4s-4-1.79-4-4 1.79-4 4-4 4 1.79 4 4zm-4-2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/>`
            },
            {
                text: "VOCÊ TAMBÉM ESTÁ SENDO CAÇADO",
                // SVG Olho Alerta
                svg: `<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>`
            },
            {
                text: "USE FONES DE OUVIDO PARA VANTAGEM TÁTICA",
                // SVG Headset
                svg: `<path d="M12 1c-4.97 0-9 4.03-9 9v7c0 1.66 1.34 3 3 3h3v-8H5v-2c0-3.87 3.13-7 7-7s7 3.13 7 7v2h-4v8h3c1.66 0 3-1.34 3-3v-7c0-4.97-4.03-9-9-9z"/>`
            }
        ];

        let tipIndex = 0;
        const toastBox = document.getElementById('toast-box');
        const toastIcon = document.getElementById('toast-icon-render');
        const toastText = document.getElementById('toast-text-render');

        function updateToast() {
            toastBox.classList.remove('show');
            toastBox.classList.add('hide');
            
            setTimeout(() => {
                toastIcon.innerHTML = `<svg viewBox="0 0 24 24">${tips[tipIndex].svg}</svg>`;
                toastText.innerText = tips[tipIndex].text;
                
                toastBox.classList.remove('hide');
                toastBox.classList.add('show');
                
                tipIndex = (tipIndex + 1) % tips.length;
            }, 400); // Tempo para esconder antes de trocar
        }

        /* ========================================================
           SISTEMA DE LOADING (A BALA) & FLUXO
        ======================================================== */
        let loadProgress = 0;
        const bar = document.getElementById('loading-bar');
        const statusText = document.getElementById('loading-status');
        const impactFx = document.getElementById('impact-fx');
        
        let isLandscape = window.innerWidth > window.innerHeight;

        // Checa orientação em tempo real
        window.addEventListener('resize', () => {
            isLandscape = window.innerWidth > window.innerHeight;
        });

        function simulateLoading() {
            // Se estiver em retrato (em pé), PAUSA O CARREGAMENTO
            if (!isLandscape) {
                requestAnimationFrame(simulateLoading);
                return;
            }

            // Aceleração variável para parecer real
            let increment = Math.random() * 0.6;
            
            // Fica mais lento no final (típico de jogos)
            if (loadProgress > 80) increment = Math.random() * 0.2;

            loadProgress += increment;

            // Atualiza textos baseados na %
            if (loadProgress > 20 && loadProgress < 50) statusText.innerHTML = "SINCRONIZANDO JOGADORES<span>...</span>";
            if (loadProgress >= 50 && loadProgress < 85) statusText.innerHTML = "GERANDO CONTRATOS<span>...</span>";
            if (loadProgress >= 85 && loadProgress < 99) statusText.innerHTML = "PREPARANDO ARENA<span>...</span>";

            if (loadProgress >= 100) {
                loadProgress = 100;
                bar.style.width = '100%';
                statusText.innerHTML = "BEM-VINDO AO BLACK CONTRACT";
                
                // Dispara a explosão da bala
                impactFx.classList.add('active');
                
                // REDIRECIONAMENTO APÓS IMPACTO
                setTimeout(() => {
                    console.log("➡️ Redirecionando...");
                    window.location.href = "menu.html"; // SEU MENU AQUI
                }, 1000); // Espera 1s para o jogador ver a explosão

                return;
            }

            bar.style.width = loadProgress + '%';
            requestAnimationFrame(simulateLoading);
        }

        /* ========================================================
           INICIALIZAÇÃO (SPLASH -> LOADING)
        ======================================================== */
        window.onload = () => {
            // A animação do Splash dura 2.5s no CSS. Vamos esperar 2.6s.
            setTimeout(() => {
                // Esconde splash
                document.getElementById('splash-screen').style.display = 'none';
                
                // Mostra Loading
                const loadScreen = document.getElementById('loading-screen');
                loadScreen.style.display = 'block';
                
                // Faz o Fade In e tira o blur
                setTimeout(() => {
                    loadScreen.style.opacity = '1';
                    loadScreen.style.filter = 'blur(0px)';
                    
                    // Inicia os Toasts
                    updateToast();
                    setInterval(updateToast, 3500); // Troca a cada 3.5s

                    // Inicia a progressão da barra
                    requestAnimationFrame(simulateLoading);
                }, 50);

            }, 2600);
        };

        /* ========================================================
           FULLSCREEN API (CÓDIGO AVANÇADO)
        ======================================================== */
        function toggleFS() {
            const doc = window.document;
            const docEl = doc.documentElement;

            const requestFullScreen = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
            const cancelFullScreen = doc.exitFullscreen || doc.mozCancelFullScreen || doc.webkitExitFullscreen || doc.msExitFullscreen;

            if (!doc.fullscreenElement && !doc.mozFullScreenElement && !doc.webkitFullscreenElement && !doc.msFullscreenElement) {
                requestFullScreen.call(docEl).catch(err => {
                    console.log(`Erro Fullscreen: ${err.message}`);
                });
            } else {
                cancelFullScreen.call(doc);
            }
        }
    </script>
</body>
</html>
