<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FIRE SHOT - Em Atualização</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Montserrat:wght@800;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100vw; height: 100dvh; background: #111; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Montserrat', sans-serif; color: white;
            /* Fundo com grade pra manter a identidade visual do jogo */
            background-image: linear-gradient(rgba(0,0,0,0.3) 2px, transparent 2px), linear-gradient(90deg, rgba(0,0,0,0.3) 2px, transparent 2px);
            background-size: 50px 50px;
        }

        .update-box {
            background: rgba(20, 20, 20, 0.95);
            border: 4px solid #ffea00;
            border-radius: 15px;
            padding: 40px 30px;
            text-align: center;
            max-width: 90%;
            width: 400px;
            box-shadow: 0 0 30px rgba(255, 234, 0, 0.2);
        }

        .update-box h1 {
            font-family: 'Luckiest Guy';
            font-size: 2.5rem;
            color: #ff3e3e;
            text-shadow: 3px 3px 0 #000;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        .update-box p {
            font-size: 1rem;
            color: #ccc;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .update-box strong { color: #1e90ff; }

        /* Animação de carregamento */
        .loader {
            width: 60px; height: 60px;
            border: 6px solid #333;
            border-top: 6px solid #ffea00;
            border-bottom: 6px solid #ff3e3e;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="update-box">
        <h1>MANUTENÇÃO EXTREMA</h1>
        <p>Os servidores do <strong>FIRE SHOT</strong> estão temporariamente offline.<br><br>Estamos forjando a <strong>Season 1</strong> com novos recursos, melhorias no multiplayer e muito mais. Segura a emoção e volte em breve!</p>
        <div class="loader"></div>
    </div>

</body>
</html>
