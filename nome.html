<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BLACK CONTRACT - Identidade</title>

    <style>
        /* ========================================================
           BASE & TYPOGRAPHY
        ======================================================== */
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@1,900;1,500&display=swap');

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            user-select: none; -webkit-tap-highlight-color: transparent; 
        }

        body, html {
            width: 100%; height: 100%; background-color: #000; overflow: hidden;
            font-family: 'Montserrat', sans-serif; color: white;
            -webkit-font-smoothing: antialiased;
        }

        .br-text { text-transform: uppercase; font-style: italic; font-weight: 900; }

        /* ========================================================
           BACKGROUND, OVERLAY & SCANLINES (Padrão do Menu)
        ======================================================== */
        #background {
            position: fixed; 
            top: -5%; left: -5%; width: 110vw; height: 110vh;
            background: url('https://fluttering-lavender-6eom5zexnw.edgeone.app/file_0000000025d4720ea248ba942a1e8101.png') center/cover no-repeat;
            z-index: 1; filter: blur(2px); transform: translateZ(0);
        }

        .overlay {
            position: fixed; 
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(135deg, rgba(0,0,0,0.65) 0%, rgba(0,0,0,0.2) 100%);
            z-index: 2; pointer-events: none;
        }

        .scanlines {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 3;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
            background-size: 100% 4px; pointer-events: none; opacity: 0.5;
        }

        /* ========================================================
           TOP RIGHT UI (Logo, Fullscreen) - Igual ao Menu
        ======================================================== */
        #top-right-ui {
            position: absolute; 
            top: max(15px, env(safe-area-inset-top)); 
            right: max(20px, env(safe-area-inset-right)); 
            z-index: 10; display: flex; flex-direction: column; align-items: flex-end; gap: 4px;
        }

        .top-row { display: flex; align-items: center; gap: 12px; }
        .logo-img { width: 100px; height: auto; filter: drop-shadow(0px 2px 5px rgba(0,0,0,0.8)); }
        
        .btn-square {
            width: 36px; height: 36px; background: rgba(20,20,20,0.8);
            border: 2px solid rgba(255,255,255,0.2); border-radius: 8px;
            display: flex; justify-content: center; align-items: center; cursor: pointer;
            transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .btn-square:active { transform: scale(0.9); border-color: #ffea00; background: rgba(40,40,40,0.9); }
        .btn-square svg { width: 18px; height: 18px; fill: #fff; }

        /* ========================================================
           BOTTOM LEFT UI (Logout)
        ======================================================== */
        #bottom-left-ui {
            position: absolute; 
            bottom: max(15px, env(safe-area-inset-bottom)); 
            left: max(20px, env(safe-area-inset-left)); 
            z-index: 10; display: flex; align-items: center; gap: 15px;
        }

        .btn-logout {
            height: 36px; padding: 0 15px; background: rgba(255, 62, 62, 0.1); 
            border: 1px solid rgba(255, 62, 62, 0.5); border-radius: 4px;
            color: #ff3e3e; font-size: 0.75rem; letter-spacing: 1px;
            display: flex; justify-content: center; align-items: center; gap: 8px;
            cursor: pointer; transform: skewX(-8deg) translateZ(0);
            box-shadow: 2px 2px 0px rgba(0,0,0,0.5); transition: all 0.15s ease-out;
        }
        .btn-logout span, .btn-logout svg { transform: skewX(8deg); }
        .btn-logout:active { transform: skewX(-8deg) translate(2px, 2px) translateZ(0); box-shadow: 0px 0px 0px rgba(0,0,0,0.8); background: rgba(255, 62, 62, 0.3); }

        /* ========================================================
           CENTER UI - SETUP PROFILE
        ======================================================== */
        #center-ui {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 5;
            display: flex; justify-content: center; align-items: center;
        }

        .setup-box {
            display: flex; flex-direction: column; gap: 12px; width: 90%; max-width: 380px; /* Mesma largura do menu */
            animation: slideUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0; transform: translateY(20px);
        }

        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

        .header-panel { text-align: center; margin-bottom: 5px; }
        .main-title { font-size: 1.5rem; color: #fff; letter-spacing: 2px; text-shadow: 2px 2px 0px #ffea00; }
        .sub-title { font-size: 0.75rem; color: #bbb; letter-spacing: 1px; margin-top: 2px; }

        /* Seleção de Avatar */
        .avatar-section { display: flex; flex-direction: column; gap: 8px; align-items: center; }
        .avatar-label { font-size: 0.7rem; color: #888; letter-spacing: 1px; }
        .avatar-grid { display: flex; gap: 15px; justify-content: center; }
        
        .avatar-option {
            width: 55px; height: 55px; background: rgba(20,20,20,0.8);
            border: 2px solid rgba(255,255,255,0.1); border-radius: 6px; cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            transition: all 0.2s; overflow: hidden; transform: skewX(-4deg);
            box-shadow: 2px 2px 0px rgba(0,0,0,0.5);
        }
        .avatar-option svg { width: 60%; height: 60%; fill: #aaa; transition: all 0.2s; transform: skewX(4deg); }
        
        .avatar-option.active { border-color: #ffea00; background: rgba(255,234,0,0.1); box-shadow: 0 0 10px rgba(255,234,0,0.2); transform: skewX(-4deg) scale(1.05); }
        .avatar-option.active svg { fill: #fff; }

        /* Input de Nome (Padrão 48px) */
        .input-section { display: flex; flex-direction: column; gap: 4px; width: 100%; position: relative; margin-top: 5px;}
        .input-container { width: 100%; transform: skewX(-8deg); position: relative; }
        
        .nickname-input {
            width: 100%; height: 48px; background: rgba(15, 15, 15, 0.85); backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.08); color: #fff; padding: 0 20px;
            font-family: 'Montserrat', sans-serif; font-size: 1rem; font-weight: 900;
            text-transform: uppercase; outline: none; transition: all 0.3s;
            text-align: center; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); border-radius: 4px;
        }
        .nickname-input:focus { border-color: #00f0ff; background: rgba(0,0,0,0.9); }
        
        /* Validação Visual */
        .nickname-input.valid { border-color: #00ff41; color: #00ff41; }
        .nickname-input.invalid { border-color: #ff3e3e; color: #ff3e3e; }
        
        .validation-text { font-size: 0.65rem; color: #888; text-align: center; min-height: 12px; transition: color 0.2s; }
        .validation-text.error { color: #ff3e3e; }
        .validation-text.success { color: #00ff41; }

        /* Botão Confirmar (Padrão 48px) */
        .btn-confirm {
            width: 100%; height: 48px; background: rgba(15, 15, 15, 0.85); backdrop-filter: blur(5px);
            color: #555; border: 1px solid rgba(255,255,255,0.05); border-radius: 4px;
            cursor: not-allowed; transform: skewX(-8deg) translateZ(0);
            display: flex; justify-content: center; align-items: center; gap: 10px;
            transition: all 0.2s; box-shadow: 4px 4px 0px rgba(0,0,0,0.4);
            font-size: 0.9rem; letter-spacing: 1px; margin-top: 5px;
        }
        .btn-confirm span, .btn-confirm svg { transform: skewX(8deg); }
        .btn-confirm svg { width: 18px; height: 18px; fill: currentColor; }
        
        .btn-confirm.ready { background: #ffea00; color: #000; border: none; cursor: pointer; box-shadow: 4px 4px 0px rgba(0,0,0,0.8); }
        .btn-confirm.ready:active { transform: skewX(-8deg) translate(3px, 3px) translateZ(0); box-shadow: 0px 0px 0px rgba(0,0,0,0.8); background: #e6d200; }

        /* ========================================================
           MODAIS (POPUPS) - Padronizadas com o Menu
        ======================================================== */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            z-index: 100; display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: all; }

        .modal-box {
            background: #0f0f0f; width: 90%; max-width: 340px;
            border: 1px solid #333; border-top: 4px solid #ffea00;
            padding: 20px; transform: skewX(-4deg) translateY(20px) translateZ(0); 
            box-shadow: 10px 10px 40px rgba(0,0,0,0.9);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
        }
        .modal-overlay.active .modal-box { transform: skewX(-4deg) translateY(0) translateZ(0); }
        .modal-box > * { transform: skewX(4deg); }

        .modal-title { font-size: 1.2rem; color: #fff; margin-bottom: 10px; text-shadow: 2px 2px 0 #000;}
        .modal-desc { font-size: 0.85rem; color: #aaa; margin-bottom: 15px; line-height: 1.4; }
        .modal-highlight { color: #ffea00; font-size: 1.3rem; display: block; margin: 10px 0; letter-spacing: 2px; text-shadow: 0 0 10px rgba(255,234,0,0.3);}

        .modal-actions { display: flex; gap: 10px; justify-content: center; margin-top: 20px;}
        .btn-modal {
            flex: 1; height: 42px; border: none; font-family: 'Montserrat', sans-serif;
            font-weight: 900; font-style: italic; cursor: pointer; transition: 0.2s;
            text-transform: uppercase; font-size: 0.85rem; transform: skewX(-6deg);
            border-radius: 2px;
        }
        .btn-modal span { display: inline-block; transform: skewX(6deg); }
        .btn-cancel { background: #222; color: #fff; border: 1px solid #444; }
        .btn-cancel:active { background: #111; transform: skewX(-6deg) scale(0.95);}
        .btn-accept { background: #ffea00; color: #000; box-shadow: 0 4px 10px rgba(255,234,0,0.2); }
        .btn-accept:active { background: #d4c300; transform: skewX(-6deg) scale(0.95); box-shadow: none;}

        /* ========================================================
           TOASTS V2 & LOADER
        ======================================================== */
        #toast-container { 
            position: fixed; top: env(safe-area-inset-top, 20px); left: 0; width: 100%; 
            pointer-events: none; z-index: 1000; display: flex; flex-direction: column; 
            align-items: center; gap: 10px; padding-top: 15px;
        }
        .toast {
            background: rgba(15,15,15,0.98); border-left: 4px solid #00f0ff;
            padding: 12px 20px; color: #fff; font-size: 0.85rem; font-weight: 900; font-style: italic;
            box-shadow: 0 10px 25px rgba(0,0,0,0.8); transform: skewX(-8deg) translateY(-30px); opacity: 0;
            animation: slideToast 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            backdrop-filter: blur(4px);
        }
        .toast.error { border-color: #ff3e3e; color: #ff3e3e;}
        .toast.success { border-color: #00ff41; color: #00ff41;}
        @keyframes slideToast { to { opacity: 1; transform: skewX(-8deg) translateY(0); } }

        #loading-overlay {
            position: fixed; top:0; left:0; width: 100vw; height:100vh; 
            background: rgba(0,0,0,0.9); z-index: 999; display: flex;
            flex-direction: column; justify-content: center; align-items: center; gap: 15px;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        #loading-overlay.active { opacity: 1; pointer-events: all; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #ffea00; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-text { color: #ffea00; font-size: 0.8rem; letter-spacing: 2px; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }

        /* ========================================================
           OTIMIZAÇÃO PARA TELAS MUITO PEQUENAS (LANDSCAPE EXTREMO)
        ======================================================== */
        @media (max-height: 400px) {
            .logo-img { width: 85px; }
            .btn-square { width: 32px; height: 32px; }
            .setup-box { gap: 8px; max-width: 360px;}
            .avatar-option { width: 45px; height: 45px; }
            .nickname-input { height: 42px; font-size: 0.9rem; }
            .btn-confirm { height: 42px; font-size: 0.85rem;}
            .main-title { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

    <div id="background"></div>
    <div class="overlay"></div>
    <div class="scanlines"></div>

    <div id="top-right-ui">
        <div class="top-row">
            <div class="btn-square" onclick="window.toggleFS();">
                <svg viewBox="0 0 24 24"><path d="M5 5h5v2H7v3H5V5zm4 14H5v-5h2v3h2v2zm10-5h-2v3h-3v2h5v-5zm-5-9h3v3h2V5h-5v2z"/></svg>
            </div>
            <img src="https://straight-red-bsq56o808u.edgeone.app/BackgroundEraser_20260424_211808040.png" alt="Logo" class="logo-img">
        </div>
    </div>

    <div id="bottom-left-ui">
        <button class="btn-logout br-text" onclick="window.logout()">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M16 13v-2H7V8l-5 4 5 4v-3z"/><path d="M20 3h-9c-1.103 0-2 .897-2 2v4h2V5h9v14h-9v-4H9v4c0 1.103.897 2 2 2h9c1.103 0 2-.897 2-2V5c0-1.103-.897-2-2-2z"/></svg>
            <span>DESCONECTAR</span>
        </button>
    </div>

    <div id="toast-container"></div>
    <div id="loading-overlay">
        <div class="spinner"></div>
        <div class="loading-text br-text">Sincronizando...</div>
    </div>

    <div id="center-ui">
        <div class="setup-box">
            <div class="header-panel">
                <h1 class="main-title br-text">FORJAR IDENTIDADE</h1>
                <p class="sub-title br-text">SELECIONE SUA CLASSE E CODINOME</p>
            </div>

            <div class="avatar-section">
                <div class="avatar-grid">
                    <div class="avatar-option active" data-avatar="1" onclick="window.selectAvatar(1)">
                        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
                    </div>
                    <div class="avatar-option" data-avatar="2" onclick="window.selectAvatar(2)">
                        <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
                    </div>
                    <div class="avatar-option" data-avatar="3" onclick="window.selectAvatar(3)">
                        <svg viewBox="0 0 24 24"><path d="M19.33 10.22c.45-.63.77-1.37.89-2.18.17-1.12-.13-2.26-.8-3.17-.67-.91-1.72-1.46-2.84-1.54-1.07-.07-2.12.33-2.89.96-.3.24-.56.52-.79.82-.23-.3-.49-.58-.79-.82-.77-.63-1.82-1.03-2.89-.96-1.12.08-2.17.63-2.84 1.54-.67.91-.97 2.05-.8 3.17.12.81.44 1.55.89 2.18-1.94 1.4-3.14 3.7-3.14 6.28v2h2v-2c0-2.34 1.48-4.43 3.65-5.32.74 1.41 2.21 2.32 3.85 2.32s3.11-.91 3.85-2.32c2.17.89 3.65 2.98 3.65 5.32v2h2v-2c0-2.58-1.2-4.88-3.14-6.28zM12 12c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/></svg>
                    </div>
                </div>
            </div>

            <div class="input-section">
                <div class="input-container">
                    <input type="text" id="nick-input" class="nickname-input" placeholder="DIGITE O CODINOME" maxlength="12" autocomplete="off">
                </div>
                <div id="val-msg" class="validation-text br-text">Mín. 4 letras/números. Sem espaços.</div>
            </div>

            <button id="btn-submit" class="btn-confirm br-text" onclick="window.requestContract()">
                <span>ASSINAR CONTRATO</span>
                <svg viewBox="0 0 24 24"><path d="M5 13h11.17l-4.88-4.88 1.41-1.41 7.3 7.3-7.3 7.3-1.41-1.41 4.88-4.88H5z"/></svg>
            </button>
        </div>
    </div>

    <div id="modal-confirm" class="modal-overlay" onclick="window.closeModalOutside(event)">
        <div class="modal-box">
            <h2 class="modal-title br-text">CONFIRMAR IDENTIDADE</h2>
            <p class="modal-desc">Sua tag de identificação na rede será:</p>
            <span id="confirm-nick-display" class="modal-highlight br-text">---</span>
            <p class="modal-desc" style="font-size: 0.7rem; color: #ff3e3e; margin-top: 5px;">Esta ação é permanente.</p>
            
            <div class="modal-actions">
                <button class="btn-modal btn-cancel" onclick="window.closeModal()"><span>VOLTAR</span></button>
                <button class="btn-modal btn-accept" onclick="window.finalizeContract()"><span>CONFIRMAR</span></button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // FIREBASE CONFIG (Insira as suas)
        const firebaseConfig = {
            apiKey: "SUA_API_KEY",
            authDomain: "SEU_DOMINIO",
            projectId: "SEU_PROJECT_ID",
            storageBucket: "SEU_BUCKET",
            messagingSenderId: "SEU_SENDER",
            appId: "SEU_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // VARIÁVEIS GLOBAIS
        let selectedAvatar = 1;
        let isNickValid = false;
        let finalNickname = "";

        // ÁUDIO SISTEMA (Idêntico ao Menu)
        let audioCtx;
        function playSfx(type = 'tick') {
            if(!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
            }
            if(audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            if(type === 'tick') {
                if(navigator.vibrate) navigator.vibrate(15);
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.05);
                gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                osc.start(); osc.stop(audioCtx.currentTime + 0.05);
            } else if (type === 'error') {
                if(navigator.vibrate) navigator.vibrate();
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.2);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            }
            
            osc.connect(gainNode); gainNode.connect(audioCtx.destination);
        }

        // FULLSCREEN MOBILE
        window.toggleFS = function() {
            playSfx();
            const doc = window.document; const docEl = doc.documentElement;
            const requestFS = docEl.requestFullscreen || docEl.webkitRequestFullScreen;
            const exitFS = doc.exitFullscreen || doc.webkitExitFullscreen;
            if (!doc.fullscreenElement && !doc.webkitFullscreenElement) {
                if(requestFS) requestFS.call(docEl).catch(()=>{});
            } else {
                if(exitFS) exitFS.call(doc);
            }
        };

        // TOASTS
        window.showToast = function(msg, type = 'error') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerText = msg;
            container.appendChild(toast);
            if(type === 'error') playSfx('error');
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        };

        // AVATAR SELECTOR
        window.selectAvatar = function(id) {
            playSfx();
            selectedAvatar = id;
            document.querySelectorAll('.avatar-option').forEach(el => el.classList.remove('active'));
            document.querySelector(`[data-avatar="${id}"]`).classList.add('active');
        };

        // VALIDAÇÃO DE INPUT
        const inputEl = document.getElementById('nick-input');
        const msgEl = document.getElementById('val-msg');
        const btnSubmit = document.getElementById('btn-submit');

        inputEl.addEventListener('input', function(e) {
            let val = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, ''); 
            e.target.value = val; 

            if(val.length === 0) {
                inputEl.className = 'nickname-input';
                msgEl.className = 'validation-text br-text';
                msgEl.innerText = "Mín. 4 letras/números. Sem espaços.";
                btnSubmit.classList.remove('ready');
                isNickValid = false;
            } else if(val.length < 4) {
                inputEl.className = 'nickname-input invalid';
                msgEl.className = 'validation-text error br-text';
                msgEl.innerText = "Codinome muito curto.";
                btnSubmit.classList.remove('ready');
                isNickValid = false;
            } else {
                inputEl.className = 'nickname-input valid';
                msgEl.className = 'validation-text success br-text';
                msgEl.innerText = "Formato aceito.";
                btnSubmit.classList.add('ready');
                isNickValid = true;
                finalNickname = val;
            }
        });

        // MODAL HANDLERS
        window.requestContract = function() {
            if(!isNickValid) {
                playSfx('error');
                inputEl.style.transform = "skewX(-8deg) translateX(-10px)";
                setTimeout(() => inputEl.style.transform = "skewX(-8deg) translateX(10px)", 50);
                setTimeout(() => inputEl.style.transform = "skewX(-8deg) translateX(0)", 100);
                return;
            }
            playSfx();
            document.getElementById('confirm-nick-display').innerText = finalNickname;
            document.getElementById('modal-confirm').classList.add('active');
        };

        window.closeModal = function() {
            playSfx();
            document.getElementById('modal-confirm').classList.remove('active');
        };
        window.closeModalOutside = function(e) {
            if(e.target.classList.contains('modal-overlay')) window.closeModal();
        };

        // SALVAR NO FIRESTORE
        window.finalizeContract = async function() {
            playSfx();
            const user = auth.currentUser;
            if(!user) return window.showToast("Usuário não autenticado.");

            document.getElementById('modal-confirm').classList.remove('active');
            document.getElementById('loading-overlay').classList.add('active');

            try {
                await setDoc(doc(db, "users", user.uid), {
                    nickname: finalNickname,
                    avatar: selectedAvatar,
                    level: 1,
                    xp: 0,
                    money: 1000, 
                    created_at: new Date().toISOString()
                });

                playSfx(); // Sucesso
                window.showToast("Identidade Forjada!", "success");

                setTimeout(() => {
                    document.body.style.transition = "opacity 0.4s ease";
                    document.body.style.opacity = "0";
                    setTimeout(() => window.location.href = 'lobby.html', 450);
                }, 800);

            } catch (error) {
                console.error("Erro ao salvar:", error);
                document.getElementById('loading-overlay').classList.remove('active');
                window.showToast("Erro de conexão. Tente novamente.", "error");
            }
        };

        // LOGOUT
        window.logout = function() {
            playSfx();
            signOut(auth).then(() => {
                window.location.href = 'menu.html';
            });
        };

        // AUTENTICAÇÃO
        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = 'menu.html';
        });
    </script>
</body>
</html>
